<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD OPEARTION</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gray-100 min-h-screen">
    <section class="flex justify-center pt-24 w-full">
      <div
        class="w-full max-w-2xl bg-white border border-gray-200 rounded-2xl shadow-md p-6 mx-4"
      >
        <h1 class="text-2xl font-bold mb-6 text-gray-600">Your To Do</h1>

        <div class="flex items-center gap-3">
          <input
            type="text"
            placeholder="Add new task..."
            class="flex-1 border-b-2 border-gray-500 outline-none px-2 py-2 focus:border-gray-500"
            id="taskInput"
          />

          <button
            class="w-10 h-10 flex items-center justify-center rounded-md bg-gray-500 text-white hover:bg-black"
            id="addBtn"
          >
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div class="pt-4 flex justify-end">
          <button
            id="deleteSelectedBtn"
            class="hidden text-gray-500 hover:text-black"
          >
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
        <div class="mt-6">
          <ul id="taskList"></ul>
        </div>

        <div>
          <div class="pt-4">
            <i id="remainingTodo" class="font-medium text-gray-700"
              >Your remaining todo:0</i
            >
          </div>
          <div class="pt-4">
            <i class="text-sm text-gray-500 ">
              Lorem ipsum dolor sit amet, consectetur adipisicing elit. Fuga
              quia quam perspiciatis et eaque.
            </i>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
